<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Bộ đề - Giao diện In ấn Giáo viên</title>
    <style>
        :root { --p: #6366f1; --bg: #f8fafc; --print-fz: 12pt; }
        body { font-family: 'Times New Roman', Times, serif; background: var(--bg); margin: 0; padding: 20px; color: #000; }
        
        /* GIAO DIỆN CÀI ĐẶT (KHÔNG IN) */
        .no-print { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); font-family: 'Segoe UI', sans-serif; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--p); }
        .stat-card h4 { margin: 0; font-size: 12px; text-transform: uppercase; color: #64748b; }
        .stat-card p { margin: 5px 0 0; font-size: 24px; font-weight: 800; color: var(--p); }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f8fafc; padding: 20px; border-radius: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 14px; }
        input, select { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; outline: none; }
        input:focus { border-color: var(--p); }
        
        .btn-print { grid-column: span 2; background: var(--p); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-print:hover { background: #4f46e5; transform: translateY(-2px); }

        /* ĐỊNH DẠNG BẢN IN (TỐI ƯU TIẾT KIỆM GIẤY) */
        #print-area { display: none; }
        @media print {
            @page { size: A4; margin: 10mm 10mm 15mm 10mm; } /* Lề cực sát biên */
            .no-print { display: none; }
            #print-area { display: block; width: 100%; }
            
            /* Header đề thi */
            .exam-header { display: flex; justify-content: space-between; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 12px; font-size: var(--print-fz); }
            .header-left, .header-right { text-align: center; }
            .header-left { width: 40%; font-weight: bold; }
            .header-right { width: 60%; }
            .exam-title { font-size: calc(var(--print-fz) + 2pt); font-weight: bold; margin: 5px 0; text-transform: uppercase;}
            
            /* Box điền tên */
            .student-info { margin-bottom: 15px; font-size: calc(var(--print-fz) - 1pt); }
            
            /* Nội dung 2 cột khít nhau */
            .exam-content { column-count: 2; column-gap: 8mm; column-rule: 0.5px solid #ccc; }
            
            /* Định dạng câu hỏi chữ gần */
            .q-item { break-inside: avoid; font-size: var(--print-fz); line-height: 1.15; margin-bottom: 8px; letter-spacing: -0.15px; text-align: justify;}
            .q-text { font-weight: bold; margin-bottom: 2px; }
            .options-grid { display: flex; flex-direction: column; margin-left: 10px; gap: 1px;}
            .option { font-size: calc(var(--print-fz) - 0.5pt); }
            
            /* Highlight đáp án */
            .ans-bold { font-weight: 900; text-decoration: underline; }
            
            /* Trang đáp án riêng biệt */
            .page-break { page-break-before: always; }
            .ans-sheet-wrapper { text-align: center; margin-top: 20px; }
            .ans-sheet-title { font-size: calc(var(--print-fz) + 4pt); font-weight: bold; margin-bottom: 20px; text-transform: uppercase;}
            .ans-sheet { column-count: 5; font-size: calc(var(--print-fz) + 1pt); text-align: left; }
            .ans-item { margin-bottom: 5px; font-weight: bold; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h2 style="margin-top:0; color:var(--p)">🖨️ TRÌNH TẠO ĐỀ THI BẢN IN (TỐI ƯU HÓA)</h2>
    
    <div class="stats-grid" id="stats">
        </div>

    <div class="controls">
        <div class="form-group">
            <label>Số lượng câu cần in</label>
            <input type="number" id="print-count" value="40" min="1">
        </div>
        <div class="form-group">
            <label>Mã đề (Bỏ trống = Tạo ngẫu nhiên)</label>
            <input type="text" id="exam-code" placeholder="VD: 101, A01...">
        </div>
        <div class="form-group">
            <label>Cỡ chữ in (Font size)</label>
            <input type="number" id="font-size" value="12" min="9" max="16" step="0.5">
        </div>
        <div class="form-group">
            <label>Hiển thị đáp án</label>
            <select id="ans-mode">
                <option value="sheet">In Bảng đáp án (Sang trang mới)</option>
                <option value="bold">In đậm đáp án thẳng vào câu hỏi</option>
                <option value="none">Chỉ in đề (Không đáp án)</option>
            </select>
        </div>
        <div class="form-group" style="grid-column: span 2;">
            <label>Tên bài kiểm tra</label>
            <input type="text" id="exam-title" value="ĐỀ KIỂM TRA MÔN TIẾNG ANH">
        </div>
        <button class="btn-print" onclick="prepareAndPrint()">TẠO BẢN IN</button>
    </div>
</div>

<div id="print-area">
    <div class="exam-header">
        <div class="header-left">
            TRƯỜNG / TRUNG TÂM<br>
            TỔ NGOẠI NGỮ
        </div>
        <div class="header-right">
            <div class="exam-title" id="p-title">ĐỀ KIỂM TRA</div>
            Thời gian làm bài: 45 phút<br>
            <b>Mã đề thi: <span id="p-code"></span></b>
        </div>
    </div>
    
    <div class="student-info">
        Họ, tên thí sinh:..................................................................... Lớp: .............................
    </div>

    <div class="exam-content" id="p-content"></div>
    
    <div id="p-ans-wrapper" class="ans-sheet-wrapper"></div>
</div>

<script>
let fullDb = {};
let currentSeed = 0;

// Hàm tạo số ngẫu nhiên dựa trên Seed (Mã đề)
function myRandom() {
    var x = Math.sin(currentSeed++) * 10000;
    return x - Math.floor(x);
}

function stringToSeed(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
    }
    return Math.abs(hash);
}

// Hàm xáo trộn mảng nhưng đảm bảo trật tự giữ nguyên nếu Seed không đổi
function seededShuffle(array) {
    let m = array.length, t, i;
    while (m) {
        i = Math.floor(myRandom() * m--);
        t = array[m];
        array[m] = array[i];
        array[i] = t;
    }
    return array;
}

async function init() {
    try {
        const res = await fetch('./questions.json');
        fullDb = await res.json();
        
        const total = Object.values(fullDb).flat().length;
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><h4>Tổng số câu</h4><p>${total}</p></div>
            <div class="stat-card"><h4>Hệ Dễ</h4><p>${fullDb.easy.length}</p></div>
            <div class="stat-card"><h4>Hệ TB</h4><p>${fullDb.medium.length}</p></div>
            <div class="stat-card"><h4>Hệ Khó</h4><p>${fullDb.hard.length}</p></div>
            <div class="stat-card"><h4>Hack Não</h4><p>${fullDb.vhard.length}</p></div>
        `;
        document.getElementById('print-count').max = total;
    } catch (e) {
        alert("Lỗi kết nối database (questions.json).");
    }
}

function prepareAndPrint() {
    const count = parseInt(document.getElementById('print-count').value);
    let codeStr = document.getElementById('exam-code').value.trim();
    
    // Nếu để trống mã đề, tự tạo mã 3 chữ số ngẫu nhiên
    if(!codeStr) {
        codeStr = Math.floor(Math.random() * 900 + 100).toString();
        document.getElementById('exam-code').value = codeStr;
    }
    
    const ansMode = document.getElementById('ans-mode').value;
    const fontSize = document.getElementById('font-size').value;
    
    // Cập nhật cỡ chữ in qua biến CSS
    document.documentElement.style.setProperty('--print-fz', fontSize + 'pt');
    
    // Đặt hạt giống thuật toán theo Mã Đề
    currentSeed = stringToSeed(codeStr);
    
    // Deep Copy toàn bộ database để không ảnh hưởng dữ liệu gốc khi xáo trộn
    let allQuestions = JSON.parse(JSON.stringify(Object.values(fullDb).flat()));
    
    // BƯỚC 1: Xáo trộn câu hỏi
    let selectedQuestions = seededShuffle(allQuestions).slice(0, count);
    
    // Điền Header
    document.getElementById('p-title').innerText = document.getElementById('exam-title').value;
    document.getElementById('p-code').innerText = codeStr;
    
    let html = "";
    let ansHtml = `
        <div class="page-break"></div>
        <div class="ans-sheet-title">ĐÁP ÁN MÃ ĐỀ ${codeStr}</div>
        <div class="ans-sheet">
    `;
    
    // BƯỚC 2: Xử lý và xáo trộn đáp án từng câu
    selectedQuestions.forEach((q, idx) => {
        // Gắn cờ (isCorrect) để theo dõi đáp án đúng trước khi trộn
        let optionsWithTracker = q.options.map((opt, i) => ({ text: opt, isCorrect: (i === q.a) }));
        
        // Xáo trộn 4 đáp án (Vẫn tuân theo chuỗi Seed của mã đề này)
        seededShuffle(optionsWithTracker);
        
        html += `<div class="q-item">
            <div class="q-text">Câu ${idx + 1}: ${q.q}</div>
            <div class="options-grid">`;
        
        let correctLabel = "";
        
        optionsWithTracker.forEach((optObj, oIdx) => {
            const label = String.fromCharCode(65 + oIdx); // Trả về A, B, C, D
            if (optObj.isCorrect) correctLabel = label;
            
            const boldClass = (ansMode === 'bold' && optObj.isCorrect) ? 'ans-bold' : '';
            html += `<div class="option ${boldClass}">${label}. ${optObj.text}</div>`;
        });
        
        html += `</div></div>`;
        
        // Ghi nhận vào bảng đáp án
        ansHtml += `<div class="ans-item">Câu ${idx + 1}: ${correctLabel}</div>`;
    });
    ansHtml += `</div>`;
    
    // Render nội dung
    document.getElementById('p-content').innerHTML = html;
    
    if (ansMode === 'sheet') {
        document.getElementById('p-ans-wrapper').innerHTML = ansHtml;
    } else {
        document.getElementById('p-ans-wrapper').innerHTML = "";
    }
    
    // Gọi lệnh in của trình duyệt
    setTimeout(() => { window.print(); }, 300);
}

init();
</script>
</body>
</html>
